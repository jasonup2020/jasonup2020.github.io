<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>网站正在建设中</title>
    <!-- 统一字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
        }

        /* 基础样式 */
        body {
            font-family: 'Open Sans', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f1930 0%, #1a2980 100%);
            color: #fff;
            min-height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.8;
        }

        /* 容器样式 */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .content-wrapper {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 标题样式 */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease;
        }

        /* 副标题样式 */
        .subtitle {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease 0.2s both;
        }

        /* 链接列表样式 */
        .link-list {
            margin-top: 2rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 1rem;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .link-list li {
            margin: 0.8rem 0;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: copy; /* 复制光标提示 */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-list li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .link-text {
            color: #4facfe;
            word-break: break-all;
            font-size: 0.95rem;
            flex: 1;
            user-select: all; /* 点击自动全选文本 */
        }

        .copy-btn {
            margin-left: 10px;
            padding: 4px 8px;
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid #4facfe;
            border-radius: 4px;
            color: #4facfe;
            font-size: 0.8rem;
            cursor: copy;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(79, 172, 254, 0.4);
        }

        /* 滚动条美化 */
        .link-list::-webkit-scrollbar {
            width: 6px;
        }

        .link-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .link-list::-webkit-scrollbar-thumb {
            background: rgba(79, 172, 254, 0.5);
            border-radius: 3px;
        }

        /* 复制提示框 */
        .copy-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 242, 254, 0.9);
            color: #0f1930;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }

        .copy-toast.show {
            opacity: 1;
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .content-wrapper {
                padding: 2rem 1.5rem;
            }
            
            .link-list {
                max-height: 250px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .content-wrapper {
                padding: 1.5rem 1rem;
            }
            
            .link-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <canvas id='background'></canvas>
    <div class='container'>
        <div class='content-wrapper'>
            <h1>即将上线</h1>
            <p class="subtitle">网站正在建设中...</p>
            
            <!-- 空的列表容器，由JS动态生成内容 -->
            <ul class="link-list" id="linkListContainer"></ul>
        </div>
    </div>

    <!-- 复制提示框 -->
    <div class="copy-toast" id="copyToast">复制成功！</div>

    <script>
        // ========== 地址数组配置 ==========
        // 所有地址都放在这个数组里，后续只需修改这个数组即可
        const linkList = [
            "https://jasonup2020.github.io/ok2023/0001.json",
            "https://jasonup2020.github.io/ok2023/0001.json",
            "https://jasonup2020.github.io/ok2026/0323.json",
            "https://jasonup2020.github.io/xiaosa/api.json",
            "https://jasonup2020.github.io/tv2024/yhtd.json",
            "https://jasonup2020.github.io/tv2024/yhtd_202404.json",
            "https://jasonup2020.github.io/tv2024/yhtd_2023.json"
        ];

        // ========== 动态生成地址列表 ==========
        function renderLinkList() {
            const listContainer = document.getElementById('linkListContainer');
            // 清空容器（防止重复渲染）
            listContainer.innerHTML = '';
            
            // 遍历数组生成列表项
            linkList.forEach((link, index) => {
                // 创建列表项元素
                const listItem = document.createElement('li');
                
                // 创建文本元素
                const linkText = document.createElement('span');
                linkText.className = 'link-text';
                linkText.textContent = link;
                linkText.dataset.index = index; // 标记索引，方便后续复制
                
                // 创建复制按钮
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.dataset.index = index; // 标记索引，方便后续复制
                
                // 组装元素
                listItem.appendChild(linkText);
                listItem.appendChild(copyBtn);
                
                // 添加到容器
                listContainer.appendChild(listItem);
            });
            
            // 绑定复制事件
            bindCopyEvents();
        }

        // ========== 复制功能 ==========
        function copyText(text) {
            // 使用Clipboard API复制文本
            navigator.clipboard.writeText(text).then(() => {
                // 显示复制成功提示
                showToast('复制成功！');
            }).catch(err => {
                console.error('复制失败:', err);
                // 降级方案：创建临时输入框复制
                const tempInput = document.createElement('input');
                tempInput.value = text;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                
                // 显示复制成功提示
                showToast('复制成功！');
            });
        }

        // 显示提示框
        function showToast(message) {
            const toast = document.getElementById('copyToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 绑定复制事件
        function bindCopyEvents() {
            // 按钮复制事件
            const copyButtons = document.querySelectorAll('.copy-btn');
            copyButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    const textToCopy = linkList[index];
                    copyText(textToCopy);
                });
            });

            // 文本点击复制事件
            const linkTexts = document.querySelectorAll('.link-text');
            linkTexts.forEach(text => {
                text.addEventListener('click', () => {
                    const index = text.dataset.index;
                    const textToCopy = linkList[index];
                    copyText(textToCopy);
                });
            });
        }

        // ========== 粒子背景效果 ==========
        const particles = [];
        const canvas = document.getElementById('background');
        const ctx = canvas.getContext('2d');
        
        // 初始化画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 创建粒子
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.8,
                vy: (Math.random() - 0.5) * 0.8,
                size: Math.random() * 3 + 1,
                color: `rgba(${Math.floor(Math.random()*80+100)}, ${Math.floor(Math.random()*120+100)}, 255, ${Math.random()*0.7+0.3})`,
                history: []
            });
        }

        // 鼠标位置跟踪
        const mouse = { x: canvas.width/2, y: canvas.height/2 };
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // 计算两点距离
        function getDistance(p1, p2) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            return Math.sqrt(dx*dx + dy*dy);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 半透明背景实现拖影效果
            ctx.fillStyle = 'rgba(15, 25, 48, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新和绘制粒子
            particles.forEach(particle => {
                // 粒子跟随鼠标
                const dx = mouse.x - particle.x;
                const dy = mouse.y - particle.y;
                const distance = getDistance(mouse, particle);
                
                if (distance < 200) {
                    particle.vx += dx * 0.0005;
                    particle.vy += dy * 0.0005;
                }

                // 更新位置
                particle.x += particle.vx;
                particle.y += particle.vy;

                // 边界反弹
                if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
                if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;

                // 速度阻尼
                particle.vx *= 0.99;
                particle.vy *= 0.99;

                // 绘制粒子
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.fill();

                // 绘制粒子轨迹
                particle.history.push({x: particle.x, y: particle.y});
                if (particle.history.length > 30) particle.history.shift();
                
                ctx.beginPath();
                ctx.moveTo(particle.history[0].x, particle.history[0].y);
                for (let i = 1; i < particle.history.length; i++) {
                    ctx.lineTo(particle.history[i].x, particle.history[i].y);
                }
                ctx.strokeStyle = particle.color;
                ctx.lineWidth = particle.size * 0.5;
                ctx.stroke();
            });

            // 绘制粒子之间的连线
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const distance = getDistance(particles[i], particles[j]);
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(79, 172, 254, ${0.2 - distance/500})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        // ========== 初始化 ==========
        // 启动粒子动画
        animate();
        // 渲染地址列表
        renderLinkList();
        
        console.log('tg:roulang');
    </script>
</body>
</html>
